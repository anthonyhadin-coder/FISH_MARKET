name: CI — Lint, Test & E2E

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

# Allow the E2E job to commit snapshot baselines back to the branch
permissions:
  contents: write

env:
  NODE_VERSION: '22'

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Client — ESLint + Vitest
  # ─────────────────────────────────────────────
  lint-and-test-client:
    name: 🔍 Client — Lint & Unit Tests
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint -- --max-warnings=50 || true

      - name: Run Vitest unit tests
        run: npm run test
        env:
          CI: true
          NEXT_PUBLIC_API_URL: http://127.0.0.1:5000/api
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: test-client-id

  # ─────────────────────────────────────────────
  # JOB 2: Server — ESLint + Vitest + Supertest
  # ─────────────────────────────────────────────
  lint-and-test-server:
    name: 🔍 Server — Lint & Integration Tests
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpassword
          MYSQL_DATABASE: fish_market_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint || true

      - name: Initialize Test Database
        run: npx -y tsx src/scripts/initDb.ts
        env:
          DATABASE_URL: mysql://root:testpassword@127.0.0.1:3306/fish_market_test

      - name: Run Vitest + Supertest integration tests
        run: npm run test
        env:
          CI: true
          NODE_ENV: test
          DATABASE_URL: mysql://root:testpassword@127.0.0.1:3306/fish_market_test
          REDIS_URL: redis://127.0.0.1:6379
          JWT_SECRET: ci-test-jwt-secret-minimum-32-characters
          JWT_REFRESH_SECRET: ci-test-refresh-secret-minimum-32-chars
          PORT: 5000
          ALLOWED_ORIGINS: http://127.0.0.1:3000

  # ─────────────────────────────────────────────
  # JOB 3: Visual Snapshot Update (On Push to Main)
  # ─────────────────────────────────────────────
  update-snapshots:
    name: 📸 Update Visual Snapshots
    if: "github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    needs: [lint-and-test-client, lint-and-test-server]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          cd client && npm ci
          cd ../server && npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start Services
        run: docker compose up -d db redis

      - name: Initialize Test Database
        run: cd server && npx -y tsx src/scripts/initDb.ts
        env:
          DATABASE_URL: mysql://root:password@127.0.0.1:3307/fish_market

      - name: Build client
        run: cd client && npm run build
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:5000/api

      - name: Start Apps in background
        run: |
          cd client && npm start &
          cd ../server && npm run dev &
        env:
          NODE_ENV: e2e
          PORT: 5000
          DB_HOST: 127.0.0.1
          DB_PORT: 3307
          DB_NAME: fish_market
          DB_USER: root
          DB_PASSWORD: password
          REDIS_URL: redis://127.0.0.1:6379

      - name: Wait for apps to be ready
        run: |
          npx wait-on http://127.0.0.1:3000 --timeout 120000
          npx wait-on http://127.0.0.1:5000/health --timeout 60000

      - name: Update Snapshots
        run: npx playwright test tests/e2e/visual.test.ts --update-snapshots
        continue-on-error: true
        env:
          BASE_URL: http://127.0.0.1:3000
          API_URL: http://127.0.0.1:5000/api

      - name: Commit snapshots if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tests/e2e/visual.test.ts-snapshots/
          git diff --staged --quiet && echo "No snapshot changes" || \
            (git commit -m "chore: update visual snapshots [skip ci]" && git push)

  # ─────────────────────────────────────────────
  # JOB 4: Playwright E2E Tests
  # ─────────────────────────────────────────────
  e2e-tests:
    name: 🎭 Playwright E2E Tests
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    needs: [update-snapshots]
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpassword
          MYSQL_DATABASE: fish_market_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json
            server/package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          cd client && npm ci
          cd ../server && npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Initialize Test Database
        run: cd server && npx -y tsx src/scripts/initDb.ts
        env:
          DATABASE_URL: mysql://root:testpassword@127.0.0.1:3306/fish_market_test

      - name: Build client
        run: cd client && npm run build
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:5000/api

      - name: Start background services
        run: |
          cd server && npm run dev &
          cd ../client && npm start &
        env:
          PORT: 5000
          NEXT_PUBLIC_API_URL: http://127.0.0.1:5000/api

      - name: Wait for services
        run: |
          npx wait-on http://127.0.0.1:5000/health --timeout 120000
          npx wait-on http://127.0.0.1:3000 --timeout 120000

      - name: Run Playwright tests
        run: npx playwright test
        env:
          BASE_URL: http://127.0.0.1:3000
          API_URL: http://127.0.0.1:5000/api

      - name: Upload Platewright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  deploy:
    name: 🚀 Deploy to Production
    if: "github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    needs: [e2e-tests]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Deploy Placeholder
        run: echo "Deploying to Production..."
