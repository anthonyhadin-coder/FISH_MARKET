name: CI — Lint, Test & E2E

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  NODE_VERSION: '22'

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Client — ESLint + Vitest
  # ─────────────────────────────────────────────
  lint-and-test-client:
    name: 🔍 Client — Lint & Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint -- --max-warnings=50 || true

      - name: Run Vitest unit tests
        run: npm run test
        env:
          CI: true
          NEXT_PUBLIC_API_URL: http://localhost:5000/api
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: test-client-id

  # ─────────────────────────────────────────────
  # JOB 2: Server — ESLint + Vitest + Supertest
  # ─────────────────────────────────────────────
  lint-and-test-server:
    name: 🔍 Server — Lint & Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpassword
          MYSQL_DATABASE: fish_market_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint || true

      - name: Initialize Test Database
        run: npx -y tsx src/scripts/initDb.ts
        env:
          DATABASE_URL: mysql://root:testpassword@127.0.0.1:3306/fish_market_test

      - name: Run Vitest + Supertest integration tests
        run: npm run test
        env:
          CI: true
          NODE_ENV: test
          DATABASE_URL: mysql://root:testpassword@127.0.0.1:3306/fish_market_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-jwt-secret-minimum-32-characters
          JWT_REFRESH_SECRET: ci-test-refresh-secret-minimum-32-chars
          PORT: 5000
          ALLOWED_ORIGINS: http://localhost:3000

  # ─────────────────────────────────────────────
  # JOB 3: Playwright E2E Tests
  # ─────────────────────────────────────────────
  e2e-tests:
    name: 🎭 Playwright E2E Tests
    runs-on: ubuntu-latest
    needs: [lint-and-test-client, lint-and-test-server]
    if: github.event_name == 'push'

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpassword
          MYSQL_DATABASE: fish_market_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      - name: Install client dependencies
        run: cd client && npm ci

      - name: Install server dependencies
        run: cd server && npm ci

      - name: Install Playwright browsers (Chromium only for speed)
        run: cd client && npx playwright install --with-deps chromium

      - name: Initialize Test Database
        run: cd server && npx -y tsx src/scripts/initDb.ts
        env:
          DATABASE_URL: mysql://root:testpassword@127.0.0.1:3306/fish_market_test

      - name: Build client
        run: cd client && npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5000/api

      - name: Start server in background
        run: cd server && npm run dev &
        env:
          NODE_ENV: test
          PORT: 5000
          DB_HOST: localhost
          DB_PORT: 3306
          DB_NAME: fish_market_test
          DB_USER: root
          DB_PASSWORD: testpassword
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-jwt-secret-for-ci
          JWT_REFRESH_SECRET: test-refresh-secret-for-ci

      - name: Start client in background
        run: cd client && npm start &
        env:
          PORT: 3000
          NEXT_PUBLIC_API_URL: http://localhost:5000/api

      - name: Wait for server to be ready
        run: npx wait-on http://localhost:5000/health --timeout 120000

      - name: Wait for client to be ready
        run: npx wait-on http://localhost:3000 --timeout 120000

      - name: Run Playwright E2E tests
        run: cd client && npx playwright test
        env:
          BASE_URL: http://localhost:3000
          API_URL: http://localhost:5000/api

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: client/playwright-report/
          retention-days: 7
