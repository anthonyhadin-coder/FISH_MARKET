name: Deploy — Production

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  FRONTEND_IMAGE_NAME: ${{ github.repository }}-frontend
  BACKEND_IMAGE_NAME: ${{ github.repository }}-backend

jobs:
  build-and-push-images:
    name: 🐳 Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}

      - name: Extract metadata (tags, labels) for Backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.fishmarket.app

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}

  deploy-production:
    name: 🚀 Deploy to Cloud Providers
    runs-on: ubuntu-latest
    needs: build-and-push-images
    environment: production
    env:
      GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────
      # FRONTEND: Deploy to Vercel (Recommended) OR Cloud Run
      # We keep Vercel CLI for frontend edge performance
      # ─────────────────────────────────────────────
      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy Frontend to Vercel
        id: vercel-deploy
        run: |
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "deploy_url=$DEPLOY_URL" >> $GITHUB_OUTPUT
        working-directory: apps/frontend

      # ─────────────────────────────────────────────
      # BACKEND: Deploy to Google Cloud Run
      # ─────────────────────────────────────────────
      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ env.GCP_CREDENTIALS }}'

      - name: Deploy Backend to Cloud Run
        id: deploy-backend
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: fish-market-backend
          image: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:main
          region: us-central1
          env_vars: |
            NODE_ENV=production
            CLIENT_URL=https://fishmarket.app
            ALLOWED_ORIGINS=https://fishmarket.app
          secrets: |
            DATABASE_URL=DATABASE_URL:latest
            REDIS_URL=REDIS_URL:latest
            JWT_SECRET=JWT_SECRET:latest
            REFRESH_TOKEN_SECRET=REFRESH_TOKEN_SECRET:latest

      - name: Print success summary
        run: |
          echo "======================================"
          echo "  🐟 Deep Ocean Fish Market Deployed! "
          echo "======================================"
          echo "  Frontend: ${{ steps.vercel-deploy.outputs.deploy_url }}"
          echo "  Backend:  ${{ steps.deploy-backend.outputs.url }}"
          echo "======================================"
